name = "malevitamin-proxy"
main = "worker.js"
compatibility_date = "2024-12-01"

# Routes - this tells Cloudflare to run the Worker for your domain
routes = [
  { pattern = "malevitamin.co.za/*", zone_name = "malevitamin.co.za" },
  { pattern = "www.malevitamin.co.za/*", zone_name = "malevitamin.co.za" },
]
